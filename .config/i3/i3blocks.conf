# i3blocks configuration file
#
# The i3blocks man page describes the usage of the binary,
# and its website describes the configuration:
#
#     https://vivien.github.io/i3blocks


# Global properties
command=/usr/lib/i3blocks/$BLOCK_NAME
separator_block_width=15
markup=none

[title]
command=~/.config/i3/scripts/title.sh
interval=persist
separator=false
min_width=870
# background=#FF0000
# color=#FFFFFF
align=left

[cpu_usage]
command=~/.config/i3/scripts/cpu.sh
interval=5
separator=false

[ram]
command=~/.config/i3/scripts/ram.sh
interval=10
separator=false

[disks]
command=~/.config/i3/scripts/disks.sh /
interval=10
separator=false

[time]
command=date "+[  %a %d %b ] [  %I:%M %P ]"
interval=30
